services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captive-portal-app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - portal-storage:/var/www/html/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.captive-portal.rule=Host(`bruckestudio.com`) || Host(`www.bruckestudio.com`)"
      - "traefik.http.routers.captive-portal.entrypoints=websecure"
      - "traefik.http.routers.captive-portal.tls.certresolver=letsencrypt"
      - "traefik.http.services.captive-portal.loadbalancer.server.port=80"
    networks:
      - default

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captive-portal-worker
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "false"
    init: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      portal:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--queue=default", "--tries=3", "--sleep=3", "--timeout=120", "--verbose", "--no-interaction"]
    volumes:
      - portal-storage:/var/www/html/storage

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captive-portal-scheduler
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "false"
    init: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      portal:
        condition: service_healthy
    command: ["php", "artisan", "schedule:work", "--verbose", "--no-interaction"]
    volumes:
      - portal-storage:/var/www/html/storage

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captive-portal-migrate
    restart: "no"
    profiles: ["ops"]
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["php", "artisan", "migrate", "--force", "--no-interaction"]
    volumes:
      - portal-storage:/var/www/html/storage

  redis:
    image: redis:7.2-alpine
    container_name: captive-portal-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data

  db:
    image: mysql:8.4
    container_name: captive-portal-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-kennfi_lab}
      MYSQL_USER: ${DB_USERNAME:-kennfi_lab_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_root_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql

  omada-controller:
    image: ${OMADA_CONTROLLER_IMAGE:-mbentley/omada-controller}:${OMADA_CONTROLLER_TAG:-6.1.0.19}
    container_name: omada-controller
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Manila}
      MANAGE_HTTP_PORT: 8088
      MANAGE_HTTPS_PORT: 8043
      PORTAL_HTTP_PORT: 8088
      PORTAL_HTTPS_PORT: 8843
      PORT_APP_DISCOVERY: 27001
      PORT_DISCOVERY: 29810
      PORT_MANAGER_V1: 29811
      PORT_ADOPT_V1: 29812
      PORT_UPGRADE_V1: 29813
      PORT_MANAGER_V2: 29814
      PORT_TRANSFER_V2: 29815
      PORT_RTTY: 29816
      PORT_DEVICE_MONITOR: 29817
      SHOW_SERVER_LOGS: "true"
      SHOW_MONGODB_LOGS: "false"
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    ports:
      - "8043:8043/tcp"
      - "8088:8088/tcp"
      - "8843:8843/tcp"
      - "27001:27001/udp"
      - "29810:29810/udp"
      - "29811-29817:29811-29817/tcp"
    volumes:
      - omada-data:/opt/tplink/EAPController/data
      - omada-logs:/opt/tplink/EAPController/logs

volumes:
  mysql-data:
  redis-data:
  omada-data:
  omada-logs:
  portal-storage:
