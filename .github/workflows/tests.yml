name: Tests

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    name: Node 20 Frontend Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vite-assets
          path: public/build/

  php-tests:
    runs-on: ubuntu-latest
    name: PHP 8.4 Laravel Tests
    needs: frontend-build
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vite-assets
          path: public/build/

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, curl, dom, fileinfo, gd, intl, mbstring, pdo, pdo_sqlite, sqlite, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run Laravel test suite
        run: php artisan test

      - name: Smoke test cached bootstrap
        run: |
          php artisan migrate --database=sqlite --path=database/migrations/0001_01_01_000001_create_cache_table.php --force
          php artisan config:cache
          php artisan route:cache
          php artisan optimize:clear
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: /tmp/test.db
          CACHE_STORE: array
